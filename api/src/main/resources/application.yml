spring:
  application:
    name: "api"
  config:
    import: optional:file:.env[.properties]
  jpa:
    hibernate:
      ddl-auto: none # Do NOT modify database
    database-platform: "org.hibernate.dialect.PostgreSQLDialect"
    show-sql: "true" # Optional for logging SQL
    properties:
      hibernate:
        format_sql: "true"
  datasource:
    url: "jdbc:postgresql://${DB_HOST}/${DB_NAME}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
  cache:
    cache-names: "supermarketCache"
  devtools:
    add-properties: "true"
  threads:
    virtual:
      enabled: "true" # currently provides no performance gain
  api-docs:
    enabled: "true"
  swagger-ui:
    enabled: "true"

management:
  health:
    readinessstate:
      enabled: "true"
    livenessstate:
      enabled: "true"
  endpoints:
    health:
      probes:
        enabled: "true"

server:
  servlet:
    context-path: "/api" # set base path for api

logging:
  level:
    com:
      bearclawvisions: "DEBUG"
    org:
      zalando:
        logbook: "TRACE"
